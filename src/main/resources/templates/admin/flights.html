<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des vols</title>
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<header>
    <h1>Interface Admin – Backoffice</h1>
    <div th:replace="~{admin/menu :: menu}"></div>
</header>
<main>
    <h1>Liste des vols</h1>
    <a href="/admin/flights/new" style="margin-bottom: 10px; display: inline-block;">➕ Ajouter</a>
    <div th:if="${success}" th:text="${success}" style="color:green; font-weight:bold; margin-bottom:10px;"></div>
    <div th:if="${error}" th:text="${error}" style="color:red; font-weight:bold; margin-bottom:10px;"></div>
    <table border="1">
        <thead>
        <tr>
            <th>ID</th><th>Numéro</th><th>Départ</th><th>Arrivée</th><th>Places</th><th>Places dispo</th><th>Status</th><th>Prix</th><th>Détail</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="flight : ${flights}">
            <td th:text="${flight.idFlight}"></td>
            <td th:text="${flight.numFlight}"></td>
            <td th:text="${flight.dateDeparture}"></td>
            <td th:text="${flight.dateArrival}"></td>
            <td th:text="${flight.seats}"></td>
            <td th:text="${flight.seatsAvailable}"></td>
            <td th:text="${flight.status}"></td>
            <td th:text="${flight.price}"></td>
            <td>
                <a th:if="${flight.idFlight != null}" th:href="@{'/admin/flights/' + ${flight.idFlight}}">Voir</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/admin" style="margin-top: 20px; display: inline-block;">Retour menu admin</a>
</main>
</body>
</html>
